<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🎮 Game Dev — Charlie & Bro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      color: #e0e0ff;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    canvas#stars {
      position: fixed;
      top: 0; left: 0;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 20px;
      max-width: 600px;
    }

    h1 {
      font-size: 3rem;
      letter-spacing: 4px;
      color: #a78bfa;
      text-shadow: 0 0 20px #7c3aed, 0 0 40px #7c3aed;
      margin-bottom: 8px;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { text-shadow: 0 0 20px #7c3aed, 0 0 40px #7c3aed; }
      50%       { text-shadow: 0 0 30px #a78bfa, 0 0 70px #a78bfa; }
    }

    .subtitle {
      font-size: 1rem;
      color: #818cf8;
      letter-spacing: 2px;
      margin-bottom: 40px;
    }

    .badge {
      display: inline-block;
      background: #1e1b4b;
      border: 1px solid #4f46e5;
      border-radius: 999px;
      padding: 6px 18px;
      font-size: 0.75rem;
      color: #a5b4fc;
      letter-spacing: 2px;
      margin-bottom: 40px;
      animation: blink 1.4s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    #pong {
      border: 2px solid #4f46e5;
      border-radius: 8px;
      background: #0a0a18;
      display: block;
      margin: 0 auto 32px;
      box-shadow: 0 0 30px #4f46e530;
      cursor: none;
      max-width: 100%;
    }

    .hint {
      font-size: 0.7rem;
      color: #6366f1;
      letter-spacing: 2px;
      margin-bottom: 32px;
    }

    .footer-note {
      font-size: 0.65rem;
      color: #3730a3;
      letter-spacing: 1px;
    }
    .footer-note a { color: #6366f1; text-decoration: none; }
    .footer-note a:hover { color: #a78bfa; }
  </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="container">
  <h1>GAME ON</h1>
  <p class="subtitle">CHARLIE &amp; BROTHER — BUILDING SOMETHING</p>
  <span class="badge">● LIVE CODING</span>

  <canvas id="pong" width="480" height="240"></canvas>
  <p class="hint">MOVE YOUR MOUSE / TOUCH TO PLAY — BEAT THE CPU</p>

  <p class="footer-note">
    a very early prototype &nbsp;·&nbsp;
    <a href="/">charlieguthrie.com</a>
  </p>
</div>

<script>
  // ── Starfield ──────────────────────────────────────────────
  const sc = document.getElementById('stars');
  const sx = sc.getContext('2d');
  function resizeStars() { sc.width = innerWidth; sc.height = innerHeight; }
  resizeStars();
  window.addEventListener('resize', resizeStars);
  const stars = Array.from({length: 180}, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.4 + 0.2,
    s: Math.random() * 0.3 + 0.05,
    t: Math.random() * Math.PI * 2
  }));
  function drawStars() {
    sx.clearRect(0, 0, sc.width, sc.height);
    stars.forEach(s => {
      s.t += s.s * 0.01;
      const alpha = 0.4 + 0.5 * Math.sin(s.t);
      sx.beginPath();
      sx.arc(s.x * sc.width, s.y * sc.height, s.r, 0, Math.PI * 2);
      sx.fillStyle = `rgba(167,139,250,${alpha})`;
      sx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  requestAnimationFrame(drawStars);

  // ── Pong ───────────────────────────────────────────────────
  const c = document.getElementById('pong');
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  const PAD_W = 10, PAD_H = 60, BALL_R = 7;

  let state = {
    ball:   { x: W/2, y: H/2, vx: 3, vy: 2.2 },
    player: { y: H/2 - PAD_H/2, score: 0 },
    cpu:    { y: H/2 - PAD_H/2, score: 0 },
    mouseY: H/2
  };

  c.addEventListener('mousemove', e => {
    const r = c.getBoundingClientRect();
    state.mouseY = (e.clientY - r.top) * (H / r.height);
  });
  c.addEventListener('touchmove', e => {
    e.preventDefault();
    const r = c.getBoundingClientRect();
    state.mouseY = (e.touches[0].clientY - r.top) * (H / r.height);
  }, { passive: false });

  function resetBall(dir = 1) {
    state.ball = { x: W/2, y: H/2,
      vx: dir * (3 + Math.random()),
      vy: (Math.random() - 0.5) * 5 };
  }

  function update() {
    const { ball, player, cpu } = state;

    player.y = Math.max(0, Math.min(H - PAD_H, state.mouseY - PAD_H/2));

    const cpuCenter = cpu.y + PAD_H/2;
    if (cpuCenter < ball.y - 4) cpu.y += 2.4;
    if (cpuCenter > ball.y + 4) cpu.y -= 2.4;
    cpu.y = Math.max(0, Math.min(H - PAD_H, cpu.y));

    ball.x += ball.vx;
    ball.y += ball.vy;

    if (ball.y - BALL_R < 0)     { ball.y = BALL_R;     ball.vy *= -1; }
    if (ball.y + BALL_R > H)     { ball.y = H - BALL_R; ball.vy *= -1; }

    if (ball.x - BALL_R < PAD_W + 8 &&
        ball.y > player.y && ball.y < player.y + PAD_H) {
      ball.vx = Math.abs(ball.vx) * 1.05;
      ball.vy += (ball.y - (player.y + PAD_H/2)) * 0.1;
    }

    if (ball.x + BALL_R > W - PAD_W - 8 &&
        ball.y > cpu.y && ball.y < cpu.y + PAD_H) {
      ball.vx = -Math.abs(ball.vx) * 1.05;
      ball.vy += (ball.y - (cpu.y + PAD_H/2)) * 0.1;
    }

    const speed = Math.hypot(ball.vx, ball.vy);
    if (speed > 12) { ball.vx *= 12/speed; ball.vy *= 12/speed; }

    if (ball.x < 0)  { cpu.score++;    resetBall( 1); }
    if (ball.x > W)  { player.score++; resetBall(-1); }
  }

  function draw() {
    const { ball, player, cpu } = state;
    ctx.clearRect(0, 0, W, H);

    ctx.setLineDash([6, 8]);
    ctx.strokeStyle = '#1e1b4b';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
    ctx.setLineDash([]);

    ctx.font = 'bold 28px Courier New';
    ctx.fillStyle = '#312e81';
    ctx.textAlign = 'center';
    ctx.fillText(player.score, W/4, 36);
    ctx.fillText(cpu.score, 3*W/4, 36);

    const grd = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, BALL_R * 3);
    grd.addColorStop(0, 'rgba(167,139,250,0.6)');
    grd.addColorStop(1, 'rgba(167,139,250,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R * 3, 0, Math.PI*2); ctx.fill();

    ctx.fillStyle = '#a78bfa';
    ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI*2); ctx.fill();

    const drawPad = (x, y) => {
      ctx.shadowColor = '#7c3aed';
      ctx.shadowBlur = 12;
      ctx.fillStyle = '#818cf8';
      ctx.beginPath();
      ctx.roundRect(x, y, PAD_W, PAD_H, 4);
      ctx.fill();
      ctx.shadowBlur = 0;
    };
    drawPad(8, player.y);
    drawPad(W - PAD_W - 8, cpu.y);
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }
  loop();
</script>
</body>
</html>
