<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280">
  <!-- Background -->
  <rect width="440" height="280" fill="#F0F2F6"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="100" height="280" fill="#0053D6"/>
  <text x="50" y="30" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">🚲 CitiBike</text>
  <rect x="8" y="44" width="84" height="18" rx="4" fill="#FFFFFF33"/>
  <text x="50" y="57" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle">Overview</text>
  <text x="50" y="80" font-family="sans-serif" font-size="9" fill="#FFFFFFAA" text-anchor="middle">Demand Patterns</text>
  <text x="50" y="98" font-family="sans-serif" font-size="9" fill="#FFFFFFAA" text-anchor="middle">Station Perf.</text>
  <text x="50" y="116" font-family="sans-serif" font-size="9" fill="#FFFFFFAA" text-anchor="middle">Geographic</text>
  <text x="50" y="134" font-family="sans-serif" font-size="9" fill="#FFFFFFAA" text-anchor="middle">Trip Analysis</text>
  <text x="50" y="152" font-family="sans-serif" font-size="9" fill="#FFFFFFAA" text-anchor="middle">Real-time Status</text>

  <!-- KPI cards -->
  <rect x="110" y="12" width="72" height="44" rx="4" fill="white" filter="url(#shadow)"/>
  <text x="146" y="30" font-family="sans-serif" font-size="8" fill="#888" text-anchor="middle">Total Trips</text>
  <text x="146" y="47" font-family="sans-serif" font-size="13" font-weight="bold" fill="#0053D6" text-anchor="middle">124K</text>

  <rect x="190" y="12" width="72" height="44" rx="4" fill="white"/>
  <text x="226" y="30" font-family="sans-serif" font-size="8" fill="#888" text-anchor="middle">Avg Duration</text>
  <text x="226" y="47" font-family="sans-serif" font-size="13" font-weight="bold" fill="#0053D6" text-anchor="middle">14.2m</text>

  <rect x="270" y="12" width="72" height="44" rx="4" fill="white"/>
  <text x="306" y="30" font-family="sans-serif" font-size="8" fill="#888" text-anchor="middle">Active Stations</text>
  <text x="306" y="47" font-family="sans-serif" font-size="13" font-weight="bold" fill="#0053D6" text-anchor="middle">312</text>

  <rect x="350" y="12" width="72" height="44" rx="4" fill="white"/>
  <text x="386" y="30" font-family="sans-serif" font-size="8" fill="#888" text-anchor="middle">Member %</text>
  <text x="386" y="47" font-family="sans-serif" font-size="13" font-weight="bold" fill="#0053D6" text-anchor="middle">68%</text>

  <!-- Bar chart -->
  <rect x="110" y="66" width="200" height="100" rx="4" fill="white"/>
  <text x="120" y="80" font-family="sans-serif" font-size="8" fill="#555">Trips by Hour</text>
  <!-- bars -->
  <rect x="118" y="118" width="10" height="32" fill="#0053D6" opacity="0.7"/>
  <rect x="131" y="110" width="10" height="40" fill="#0053D6" opacity="0.7"/>
  <rect x="144" y="95" width="10" height="55" fill="#0053D6" opacity="0.7"/>
  <rect x="157" y="100" width="10" height="50" fill="#0053D6" opacity="0.7"/>
  <rect x="170" y="108" width="10" height="42" fill="#0053D6" opacity="0.7"/>
  <rect x="183" y="90" width="10" height="60" fill="#0053D6" opacity="0.7"/>
  <rect x="196" y="85" width="10" height="65" fill="#0053D6" opacity="0.7"/>
  <rect x="209" y="98" width="10" height="52" fill="#0053D6" opacity="0.7"/>
  <rect x="222" y="112" width="10" height="38" fill="#0053D6" opacity="0.7"/>
  <rect x="235" y="120" width="10" height="30" fill="#0053D6" opacity="0.7"/>
  <rect x="248" y="125" width="10" height="25" fill="#0053D6" opacity="0.7"/>
  <rect x="261" y="119" width="10" height="31" fill="#0053D6" opacity="0.7"/>
  <line x1="118" y1="150" x2="295" y2="150" stroke="#ddd" stroke-width="1"/>

  <!-- Map placeholder -->
  <rect x="318" y="66" width="110" height="100" rx="4" fill="#e8f0fe"/>
  <text x="373" y="105" font-family="sans-serif" font-size="8" fill="#0053D6" text-anchor="middle">Station Map</text>
  <circle cx="345" cy="118" r="4" fill="#0053D6" opacity="0.6"/>
  <circle cx="362" cy="108" r="5" fill="#0053D6" opacity="0.8"/>
  <circle cx="378" cy="122" r="3" fill="#0053D6" opacity="0.5"/>
  <circle cx="393" cy="112" r="6" fill="#0053D6" opacity="0.9"/>
  <circle cx="407" cy="126" r="3" fill="#0053D6" opacity="0.6"/>
  <circle cx="358" cy="130" r="4" fill="#0053D6" opacity="0.7"/>

  <!-- Line chart -->
  <rect x="110" y="174" width="318" height="96" rx="4" fill="white"/>
  <text x="120" y="188" font-family="sans-serif" font-size="8" fill="#555">Monthly Trips</text>
  <polyline points="118,240 158,228 198,234 238,210 278,218 318,200 358,205 398,192" fill="none" stroke="#0053D6" stroke-width="2.5" stroke-linejoin="round"/>
  <polyline points="118,240 158,228 198,234 238,210 278,218 318,200 358,205 398,192 398,260 118,260" fill="#0053D6" opacity="0.08"/>
  <line x1="118" y1="260" x2="418" y2="260" stroke="#ddd" stroke-width="1"/>
</svg>
